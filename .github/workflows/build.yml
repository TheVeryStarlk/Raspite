name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version
        required: true
        type: string

      release_notes:
        description: Release notes
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      packages: write
      contents: read

    steps:
      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "latest"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: |
          dotnet pack \
            --configuration Release \
            --no-build \
            -p:PackageVersion="${{ inputs.version }}" \
            -p:PackageReleaseNotes="${{ inputs.release_notes }}"

      - name: Push to NuGet
        run: dotnet nuget push *.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

      - name: Push to GitHub
        run: dotnet nuget push *.nupkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }}
